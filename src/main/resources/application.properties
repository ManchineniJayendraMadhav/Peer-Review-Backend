spring.application.name=PeerCollabPlatform

spring.datasource.url=jdbc:mysql://localhost:3306/peercollab?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
# Update password above according to locally installed MySQL instance

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload path configs if needed (not strictly required since we just store file URL, but good to have)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Secrets (for demo purposes we use a simple secret, in prod use environment var)
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expirationMs=86400000

# CORS config
app.cors.allowedOrigins=http://localhost:5173,http://localhost:3000
